// Sample WebSocket Client for Real-Time Quiz Application
// This HTML file demonstrates how to use the WebSocket API

<!DOCTYPE html>
<html>
<head>
    <title>Real-Time Quiz - WebSocket Client</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
            font-size: 14px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .stats {
            background-color: #fff;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
        }
        .leaderboard-entry {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .message {
            padding: 10px;
            background-color: #e7f3ff;
            border-left: 4px solid #2196F3;
            margin: 10px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Real-Time Quiz Application - WebSocket Client</h1>

    <div class="container">
        <!-- Left Panel: Session & Answer Submission -->
        <div class="panel">
            <h2>Quiz Session</h2>
            
            <h3>Join Session</h3>
            <input type="text" id="sessionCode" placeholder="Enter session code (e.g., ABC123)">
            <input type="text" id="studentName" placeholder="Enter your name">
            <button onclick="joinSession()">Join Session</button>
            
            <h3>Submit Answer</h3>
            <input type="number" id="studentId" placeholder="Student ID" min="1">
            <input type="number" id="questionId" placeholder="Question ID" min="1">
            <input type="number" id="selectedOption" placeholder="Selected Option (0-3)" min="0" max="3">
            <button onclick="submitAnswer()">Submit Answer</button>
            
            <div id="messages"></div>
        </div>

        <!-- Right Panel: Live Statistics -->
        <div class="panel">
            <h2>Live Analytics</h2>
            
            <h3>Question Stats</h3>
            <input type="number" id="statsQuestionId" placeholder="Question ID" min="1">
            <button onclick="getQuestionStats()">Get Stats</button>
            <div id="statsContainer" class="stats"></div>
            
            <h3>Leaderboard</h3>
            <input type="number" id="leaderboardSessionId" placeholder="Session ID" min="1">
            <button onclick="getLeaderboard()">Get Leaderboard</button>
            <div id="leaderboardContainer" class="stats"></div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let connected = false;

        function connect() {
            const socket = new SockJS('http://localhost:8080/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, (frame) => {
                connected = true;
                addMessage('Connected to WebSocket: ' + frame.headers['server']);
                
                // Subscribe to session updates
                stompClient.subscribe('/topic/session/1', (message) => {
                    const stats = JSON.parse(message.body);
                    addMessage('Question Stats Received: Q' + stats.questionId);
                    displayStats(stats);
                });
            }, (error) => {
                addMessage('WebSocket error: ' + error);
            });
        }

        function joinSession() {
            const code = document.getElementById('sessionCode').value;
            const name = document.getElementById('studentName').value;
            
            if (!code || !name) {
                addMessage('Please enter session code and name');
                return;
            }

            fetch(`http://localhost:8080/api/sessions/join/${code}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ name: name })
            })
            .then(res => res.json())
            .then(data => {
                addMessage('Joined session! Student ID: ' + data.studentId);
                document.getElementById('studentId').value = data.id;
            })
            .catch(err => addMessage('Error: ' + err));
        }

        function submitAnswer() {
            if (!connected) {
                connect();
            }

            const request = {
                studentId: parseInt(document.getElementById('studentId').value),
                questionId: parseInt(document.getElementById('questionId').value),
                selectedOption: parseInt(document.getElementById('selectedOption').value),
                sessionCode: document.getElementById('sessionCode').value
            };

            stompClient.send('/app/answer', {}, JSON.stringify(request));
            addMessage('Answer submitted! (via WebSocket)');
        }

        function getQuestionStats() {
            const questionId = document.getElementById('statsQuestionId').value;
            
            if (!questionId) {
                addMessage('Please enter question ID');
                return;
            }

            fetch(`http://localhost:8080/api/answers/stats/question/${questionId}`)
                .then(res => res.json())
                .then(data => displayStats(data))
                .catch(err => addMessage('Error: ' + err));
        }

        function getLeaderboard() {
            const sessionId = document.getElementById('leaderboardSessionId').value;
            
            if (!sessionId) {
                addMessage('Please enter session ID');
                return;
            }

            fetch(`http://localhost:8080/api/answers/leaderboard/${sessionId}`)
                .then(res => res.json())
                .then(data => displayLeaderboard(data))
                .catch(err => addMessage('Error: ' + err));
        }

        function displayStats(stats) {
            let html = `<h4>${stats.questionText}</h4>`;
            html += `<p>Total Responses: ${stats.totalResponses}</p>`;
            html += `<p>Correct Answers: ${stats.correctCount}</p>`;
            html += '<h5>Answer Distribution:</h5>';
            
            for (const [option, count] of Object.entries(stats.answerCounts)) {
                const pct = stats.answerPercentages['Option ' + String.fromCharCode(65 + parseInt(option))];
                html += `<div>Option ${String.fromCharCode(65 + parseInt(option))}: ${count} (${pct.toFixed(1)}%)</div>`;
            }
            
            document.getElementById('statsContainer').innerHTML = html;
            addMessage('Stats updated');
        }

        function displayLeaderboard(data) {
            let html = `<p>Total Participants: ${data.totalParticipants}</p>`;
            html += '<table style="width: 100%;">';
            html += '<tr><th>Rank</th><th>Name</th><th>Score</th><th>Correct</th></tr>';
            
            data.leaderboard.forEach(entry => {
                html += `<tr>
                    <td>${entry.rank}</td>
                    <td>${entry.name}</td>
                    <td>${entry.score}</td>
                    <td>${entry.correctAnswers}/${entry.totalAnswered}</td>
                </tr>`;
            });
            
            html += '</table>';
            document.getElementById('leaderboardContainer').innerHTML = html;
            addMessage('Leaderboard updated');
        }

        function addMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const msgElement = document.createElement('div');
            msgElement.className = 'message';
            msgElement.textContent = new Date().toLocaleTimeString() + ' - ' + msg;
            messagesDiv.appendChild(msgElement);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        // Connect when page loads
        window.onload = () => {
            connect();
        };
    </script>
</body>
</html>
