spring:
  application:
    name: quiz-app
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/quiz_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# Logging
logging:
  level:
    root: INFO
    com.quizapp: DEBUG
    org.springframework.web: INFO
    org.springframework.websocket: DEBUG
    org.hibernate: WARN

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024
