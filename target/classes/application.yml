spring:
  application:
    name: quiz-app
  
  # Database Configuration
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
  
  # H2 Console (for development)
  h2:
    console:
      enabled: true
      path: /h2-console
  
  # WebSocket Configuration
  websocket:
    stomp:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.quizapp: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
